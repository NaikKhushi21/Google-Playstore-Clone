spring:
  application:
    name: playstore-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/playstore}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: warn

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
      expiration-seconds: ${APP_SECURITY_JWT_EXPIRATION_SECONDS:3600}
